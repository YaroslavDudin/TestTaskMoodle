{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}

        {% csrf_token %}
        {{ form.as_p }}

    </form>
    <br>
    <a href="{% url 'product_list' %}">Отмена</a>
{% endblock %}
