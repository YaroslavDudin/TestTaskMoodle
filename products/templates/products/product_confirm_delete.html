{% extends 'base.html' %}

{% block title %}Удаление товара{% endblock %}

{% block content %}
    <h1>Вы уверены, что хотите удалить "{{ product.name }}"?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background-color: #ff4d4d; color: white; padding: 10px 20px; border: none; cursor: pointer;">Удалить окончательно</button>
    </form>
    <br>
    <a href="{% url 'product_list' %}">Отмена</a>
{% endblock %}
